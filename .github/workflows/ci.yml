name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy==1.26.4 scipy==1.12.0 opencv-python-headless==4.10.0.84 tabulate==0.9.0

      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: python -m unittest discover -s tests -p "test_*.py" -v
